name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://user:password@example.com/neondb?sslmode=require
      NEON_AUTH_BASE_URL: https://example.neon.tech/neondb/auth
      NEXT_PUBLIC_NEON_AUTH_BASE_URL: https://example.neon.tech/neondb/auth
      NEON_AUTH_COOKIE_SECRET: test-test-test-test-test-test-test-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Run linter
        run: npm run lint

      - name: Run production build
        run: npm run build
